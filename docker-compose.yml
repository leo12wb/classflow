services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: classflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - storage_data:/var/www/storage/app/public
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mini_ead}
      DB_USERNAME: ${DB_USERNAME:-classflow}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - classflow

  nginx:
    image: nginx:1.25-alpine
    container_name: classflow_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - classflow

  db:
    image: mysql:8.0
    container_name: classflow_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mini_ead}
      MYSQL_USER: ${DB_USERNAME:-classflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow

networks:
  classflow:
    driver: bridge

volumes:
  db_data:
  storage_data:
